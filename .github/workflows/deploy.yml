name: Deploy API

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-api
  cancel-in-progress: false

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx wrangler d1 migrations apply DB --remote --config apps/api/wrangler.jsonc
      - run: npx wrangler deploy --config apps/api/wrangler.jsonc
