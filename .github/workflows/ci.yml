name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npm run check
      - run: npm run test:tui --workspace @ziloteams/cli
      - run: npm run build --workspace @ziloteams/api
